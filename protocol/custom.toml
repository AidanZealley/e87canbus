can_id = 0x705
length = 8
direction = "Servotronic controller to coordinator"
purpose = "Device HELLO"
payload = "byte 0 = protocol version, bytes 1-2 = stable device ID, bytes 3-4 = device session ID, byte 5 = sequence, bytes 6-7 = reserved zero"

[servotronic_controller_hello.bytes]
protocol_version = 0
device_id_low = 1
device_id_high = 2
device_session_id_low = 3
device_session_id_high = 4
sequence = 5
reserved_6 = 6
reserved_7 = 7

[servotronic_controller_welcome_ack]
