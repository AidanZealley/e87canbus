length = 8
direction = "Coordinator to Servotronic controller"
purpose = "WELCOME acknowledgement"
payload = "byte 0 = controller protocol version high nibble and response code low nibble, bytes 1-2 = echoed device ID, bytes 3-4 = echoed device session ID, bytes 5-6 = controller session ID, byte 7 = echoed device sequence"

[servotronic_controller_welcome_ack.bytes]
version_and_response = 0
device_id_low = 1
device_id_high = 2
device_session_id_low = 3
device_session_id_high = 4
controller_session_id_low = 5
controller_session_id_high = 6
device_sequence = 7

[servotronic_controller_heartbeat]
can_id = 0x707
